<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EliteIn · professional network</title>
    <!-- Samsung/EliteIn font stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase client library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f3f5f8;
            color: #1a1e2b;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* EliteIn premium palette */
        :root {
            --primary: #0A1747;
            --primary-light: #1F3A7A;
            --accent: #3E6AE1;
            --accent-soft: #E9EEFD;
            --background: #f3f5f8;
            --card-bg: #ffffff;
            --text-primary: #1a1e2b;
            --text-secondary: #565e75;
            --border-light: #e2e6f0;
            --border-focus: #0A1747;
            --success: #0f7b3a;
            --error: #cc3a3a;
            --shadow-sm: 0 4px 12px rgba(10,23,71,0.04);
            --shadow-md: 0 12px 32px rgba(10,23,71,0.08);
        }

        .app-wrapper {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        @media (min-width: 768px) {
            .app-wrapper {
                padding: 0 2rem;
            }
        }

        /* Navigation */
        .nav-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.96);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        @media (max-width: 640px) {
            .nav-container {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-left {
                width: 100%;
            }
            .search-bar {
                max-width: none;
            }
            .nav-right {
                width: 100%;
                justify-content: space-around;
            }
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1 1 auto;
        }

        .logo {
            color: var(--primary);
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .logo i {
            font-size: 1.8rem;
            background: linear-gradient(145deg, #0A1747, #2A4EB0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            background: #f1f4f9;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1 1 200px;
            max-width: 300px;
            border: 1.5px solid transparent;
        }

        .search-bar input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.9rem;
            outline: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .admin-login-btn {
            background: transparent;
            border: 1.5px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        /* Login Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Admin Drawer */
        .admin-drawer {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            margin: 1rem 0 2rem;
            padding: 1.5rem;
            display: none;
        }

        .admin-drawer.visible {
            display: block;
        }

        .drawer-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border-light);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        @media (min-width: 640px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .span-2 {
            grid-column: span 1;
        }

        @media (min-width: 640px) {
            .span-2 {
                grid-column: span 2;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .field input, .field textarea, .field select {
            background: #f9fbfe;
            border: 1.5px solid var(--border-light);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .field input:focus, .field textarea:focus, .field select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(10,23,71,0.1);
        }

        .apply-type-toggle {
            display: flex;
            gap: 0.5rem;
            background: #f1f4f9;
            padding: 0.3rem;
            border-radius: 48px;
            width: fit-content;
            flex-wrap: wrap;
        }

        .apply-option {
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
        }

        .apply-option.active {
            background: var(--primary);
            color: white;
        }

        .apply-url-field {
            margin-top: 0.5rem;
        }

        .action-row {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: white;
            border: 1.5px solid var(--border-light);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
        }

        /* Main Layout */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        @media (min-width: 992px) {
            .content-layout {
                grid-template-columns: 1fr 2.5fr 1fr;
            }
        }

        /* Sidebars */
        .left-sidebar, .right-sidebar {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-light);
            padding: 1.2rem;
        }

        .profile-card {
            text-align: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .avatar-large {
            width: 70px;
            height: 70px;
            background: var(--accent-soft);
            border-radius: 50%;
            margin: 0 auto 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
        }

        .profile-name {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .profile-title {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        /* Feed */
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 0.8rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            margin-bottom: 1rem;
        }

        .feed-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
        }

        .job-count-badge {
            background: var(--accent-soft);
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .job-feed {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Job Card */
        .job-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .job-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .job-card-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }

        .company-logo {
            width: 48px;
            height: 48px;
            background: var(--accent-soft);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            overflow: hidden;
            flex-shrink: 0;
        }

        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .job-title {
            font-weight: 800;
            font-size: 1rem;
        }

        .job-company {
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .job-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin: 0.4rem 0;
            flex-wrap: wrap;
        }

        .job-desc {
            font-size: 0.8rem;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .edit-btn, .delete-btn {
            border: 1px solid var(--border-light);
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 0.3rem;
        }

        .edit-btn {
            color: var(--primary);
        }

        .delete-btn {
            color: var(--error);
        }

        /* Ads */
        .ad-space {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ad-card {
            background: var(--accent-soft);
            border-radius: 16px;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }

        .ad-title {
            font-weight: 800;
            font-size: 0.9rem;
        }

        .ad-meta {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .ad-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Empty states */
        .empty-state {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            border: 1px dashed var(--border-light);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            left: 1rem;
            background: #1e293b;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            max-width: 360px;
            margin: 0 auto;
        }

        @media (min-width: 480px) {
            .toast {
                left: auto;
                right: 2rem;
            }
        }

        .toast.show {
            display: flex;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div class="nav-bar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <i class="fas fa-crown"></i>
                    <span>EliteIn</span>
                </div>
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search jobs...">
                </div>
            </div>
            <div class="nav-right">
                <div class="nav-item active">
                    <i class="fas fa-briefcase"></i>
                    <span>Jobs</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Network</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-compass"></i>
                    <span>Discover</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>Alerts</span>
                </div>
                <button class="admin-login-btn" id="showLoginBtn">
                    <i class="fas fa-lock"></i> Admin
                </button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-crown"></i> Admin Login</h2>
                <span class="close-modal" id="closeModalBtn">&times;</span>
            </div>
            <form id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="adminEmail" placeholder="admin@elitein.com" required>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="••••••••" required>
                </div>
                <div class="action-row">
                    <button type="submit" class="btn-primary" style="width: 100%;">Login</button>
                </div>
            </form>
        </div>
    </div>

    <div class="app-wrapper">
        <!-- Admin Drawer -->
        <div class="admin-drawer" id="adminDrawer">
            <div class="drawer-tabs">
                <button class="tab-btn active" data-tab="jobs">📋 Jobs</button>
                <button class="tab-btn" data-tab="ads">📢 Ads</button>
            </div>
            
            <!-- Jobs Tab -->
            <div class="tab-content active" id="jobsTab">
                <h3 style="margin-bottom: 1rem;">Post / Edit Job</h3>
                <form id="jobForm">
                    <div class="form-grid">
                        <div class="field">
                            <label>Job title *</label>
                            <input type="text" id="jobTitle" required>
                        </div>
                        <div class="field">
                            <label>Company</label>
                            <input type="text" id="jobCompany" value="Samsung">
                        </div>
                        <div class="field">
                            <label>Location</label>
                            <input type="text" id="jobLocation" value="Seoul / Remote">
                        </div>
                        <div class="field">
                            <label>Type</label>
                            <select id="jobType">
                                <option>Full-time</option>
                                <option>Part-time</option>
                                <option>Contract</option>
                                <option>Internship</option>
                            </select>
                        </div>
                        <div class="field span-2">
                            <label>Logo URL</label>
                            <input type="url" id="jobLogo">
                        </div>
                        
                        <div class="field span-2">
                            <label>Apply method</label>
                            <div class="apply-type-toggle" id="applyTypeToggle">
                                <span class="apply-option active" data-type="form">📝 Internal form</span>
                                <span class="apply-option" data-type="redirect">🔗 External link</span>
                            </div>
                            <input type="hidden" id="applyType" value="form">
                            
                            <div class="apply-url-field hidden" id="applyUrlField">
                                <label>Application URL *</label>
                                <input type="url" id="applyUrl" placeholder="https://careers.company.com/apply">
                            </div>
                        </div>
                        
                        <div class="field span-2">
                            <label>Description</label>
                            <textarea id="jobDesc" rows="4">Join our elite team to build innovative products.</textarea>
                        </div>
                    </div>
                    <input type="hidden" id="editJobId">
                    <div class="action-row">
                        <button type="submit" class="btn-primary"><i class="fas fa-cloud-upload"></i> <span id="submitBtnText">Publish job</span></button>
                        <button type="button" class="btn-secondary" id="cancelEditBtn">Clear</button>
                    </div>
                </form>
            </div>
            
            <!-- Ads Tab -->
            <div class="tab-content" id="adsTab">
                <h3 style="margin-bottom: 1rem;">Manage Ads</h3>
                <form id="adForm">
                    <div class="form-grid">
                        <div class="field span-2">
                            <label>Ad title *</label>
                            <input type="text" id="adTitle" required>
                        </div>
                        <div class="field span-2">
                            <label>Destination URL *</label>
                            <input type="url" id="adUrl" required>
                        </div>
                        <div class="field">
                            <label>Company</label>
                            <input type="text" id="adCompany" value="Sponsored">
                        </div>
                        <div class="field">
                            <label>Logo URL</label>
                            <input type="url" id="adLogo">
                        </div>
                        <div class="field span-2">
                            <label>Description</label>
                            <textarea id="adDesc" rows="3"></textarea>
                        </div>
                    </div>
                    <input type="hidden" id="editAdId">
                    <div class="action-row">
                        <button type="submit" class="btn-primary"><i class="fas fa-cloud-upload"></i> <span id="adSubmitBtnText">Publish ad</span></button>
                        <button type="button" class="btn-secondary" id="cancelAdEditBtn">Clear</button>
                    </div>
                </form>
                
                <div style="margin-top: 2rem;">
                    <h4>Current Ads</h4>
                    <div id="adList" style="margin-top: 1rem;"></div>
                </div>
            </div>
        </div>

        <!-- Main 3-column layout -->
        <div class="content-layout">
            <!-- Left sidebar -->
            <aside class="left-sidebar">
                <div class="profile-card">
                    <div class="avatar-large">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="profile-name">Alex Rivera</div>
                    <div class="profile-title">Senior Product Leader</div>
                </div>
                <div style="margin-top: 1rem;">
                    <div style="font-weight: 700;">Network</div>
                    <div style="color: var(--text-secondary); font-size: 0.8rem;">500+ connections</div>
                </div>
            </aside>

            <!-- Main feed -->
            <main>
                <div class="feed-header">
                    <h2><i class="fas fa-briefcase"></i> Job feed</h2>
                    <div class="job-count-badge" id="jobCount">0 jobs</div>
                </div>
                <div class="job-feed" id="jobGrid"></div>
            </main>

            <!-- Right sidebar - Ads -->
            <aside class="right-sidebar">
                <div class="sidebar-title" style="font-weight: 700; margin-bottom: 1rem;">Sponsored</div>
                <div class="ad-space" id="adContainer"></div>
            </aside>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"><i class="fas fa-circle-check"></i> <span id="toastMsg"></span></div>

            const adCompany = document.getElementById('adCompany');
            const adLogo = document.getElementById('adLogo');
            const adDesc = document.getElementById('adDesc');
            const editAdId = document.getElementById('editAdId');
            const adSubmitBtnText = document.getElementById('adSubmitBtnText');
            const cancelAdEdit = document.getElementById('cancelAdEditBtn');

            // Helper functions
            function showToast(text, isError = false) {
                if (!toast || !toastMsg) return;
                toastMsg.innerText = text;
                toast.style.background = isError ? '#cc3a3a' : '#1e293b';
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function esc(str) {
                if (!str) return '';
                return String(str).replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function resetJobForm() {
                if (!jobForm) return;
                jobForm.reset();
                editJobId.value = '';
                submitBtnText.innerText = 'Publish job';
                companyIn.value = 'Samsung';
                locationIn.value = 'Seoul / Remote';
                typeIn.value = 'Full-time';
                descIn.value = 'Join our elite team to build innovative products.';
                logoIn.value = '';
                
                // Reset apply type toggle
                currentApplyType = 'form';
                applyTypeInput.value = 'form';
                document.querySelectorAll('.apply-option').forEach(opt => {
                    if (opt.dataset.type === 'form') {
                        opt.classList.add('active');
                    } else {
                        opt.classList.remove('active');
                    }
                });
                applyUrlField.classList.add('hidden');
                applyUrl.value = '';
            }

            function resetAdForm() {
                if (!adForm) return;
                adForm.reset();
                editAdId.value = '';
                adSubmitBtnText.innerText = 'Publish ad';
                adCompany.value = 'Sponsored';
            }

            // Tab switching
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    const tabId = this.dataset.tab + 'Tab';
                    const tab = document.getElementById(tabId);
                    if (tab) tab.classList.add('active');
                });
            });

            // Apply type toggle
            document.querySelectorAll('.apply-option').forEach(opt => {
                opt.addEventListener('click', function() {
                    document.querySelectorAll('.apply-option').forEach(o => o.classList.remove('active'));
                    this.classList.add('active');
                    currentApplyType = this.dataset.type;
                    applyTypeInput.value = currentApplyType;
                    
                    if (currentApplyType === 'redirect') {
                        applyUrlField.classList.remove('hidden');
                        applyUrl.setAttribute('required', 'required');
                    } else {
                        applyUrlField.classList.add('hidden');
                        applyUrl.removeAttribute('required');
                    }
                });
            });

            // Load jobs from Supabase
            async function loadJobs() {
                try {
                    const { data, error } = await supabase
                        .from('jobs')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.warn('Supabase error, using demo jobs:', error.message);
                        isOfflineMode = true;
                        // Demo jobs - NO LOCALSTORAGE
                        jobs = [
                            { id: '1', title: 'Product Manager', company: 'Samsung', location: 'Seoul', type: 'Full-time', description: 'Lead product strategy for mobile experiences.', logo_url: '', apply_type: 'form' },
                            { id: '2', title: 'UX Designer', company: 'Naver', location: 'Remote', type: 'Contract', description: 'Design intuitive interfaces for web platforms.', logo_url: 'https://picsum.photos/64/64?random=23', apply_type: 'redirect', apply_url: 'https://careers.naver.com/apply' }
                        ];
                        showToast('Running in demo mode - no Supabase connection', true);
                    } else {
                        jobs = data || [];
                        isOfflineMode = false;
                    }
                } catch (err) {
                    console.warn('Connection error, using demo jobs:', err);
                    isOfflineMode = true;
                    jobs = [
                        { id: '1', title: 'Product Manager', company: 'Samsung', location: 'Seoul', type: 'Full-time', description: 'Lead product strategy for mobile experiences.', logo_url: '', apply_type: 'form' },
                        { id: '2', title: 'UX Designer', company: 'Naver', location: 'Remote', type: 'Contract', description: 'Design intuitive interfaces for web platforms.', logo_url: 'https://picsum.photos/64/64?random=23', apply_type: 'redirect', apply_url: 'https://careers.naver.com/apply' }
                    ];
                } finally {
                    renderJobCards();
                }
            }

            // Load ads from Supabase
            async function loadAds() {
                try {
                    const { data, error } = await supabase
                        .from('ads')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        console.warn('Ads error, using demo ads:', error.message);
                        ads = [
                            { id: 'ad1', title: 'Tech Summit 2024', company: 'Samsung', url: 'https://samsung.com/event', description: 'Join the future of tech', logo_url: '' }
                        ];
                    } else {
                        ads = data || [];
                    }
                } catch (err) {
                    console.warn('Ads connection error:', err);
                    ads = [
                        { id: 'ad1', title: 'Tech Summit 2024', company: 'Samsung', url: 'https://samsung.com/event', description: 'Join the future of tech', logo_url: '' }
                    ];
                } finally {
                    renderAds();
                    renderAdList();
                }
            }

            function renderJobCards() {
                if (!jobGrid || !jobCountSpan) return;
                
                if (!jobs || jobs.length === 0) {
                    jobGrid.innerHTML = '<div class="empty-state">No jobs posted yet</div>';
                    jobCountSpan.innerText = '0 jobs';
                    return;
                }

                let html = '';
                jobs.forEach(job => {
                    if (!job) return;
                    
                    const logoHtml = job.logo_url 
                        ? `<img src="${esc(job.logo_url)}" alt="logo" style="width:100%;height:100%;object-fit:cover;">` 
                        : `<i class="fas fa-building"></i>`;

                    html += `
                        <div class="job-card" onclick="window.app.showDetail('${job.id}')">
                            <div class="job-card-header">
                                <div class="company-logo">${logoHtml}</div>
                                <div>
                                    <div class="job-title">${esc(job.title || '')}</div>
                                    <div class="job-company">${esc(job.company || '—')}</div>
                                </div>
                            </div>
                            <div class="job-meta">
                                <span><i class="fas fa-map-pin"></i> ${esc(job.location || 'Remote')}</span>
                                <span><i class="fas fa-clock"></i> ${esc(job.type || 'Full-time')}</span>
                            </div>
                            <div class="job-desc">${esc(job.description || '')}</div>
                            ${isAdmin ? `
                                <div style="margin-top: 1rem;">
                                    <button class="edit-btn" onclick="event.stopPropagation(); window.app.editJob('${job.id}')">Edit</button>
                                    <button class="delete-btn" onclick="event.stopPropagation(); window.app.deleteJob('${job.id}')">Delete</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                jobGrid.innerHTML = html;
                jobCountSpan.innerText = jobs.length + (jobs.length === 1 ? ' job' : ' jobs');
            }

            function renderAds() {
                if (!adContainer) return;
                
                if (!ads || ads.length === 0) {
                    adContainer.innerHTML = '<div class="empty-state">No sponsored content</div>';
                    return;
                }

                let html = '';
                ads.forEach(ad => {
                    if (!ad) return;
                    
                    const logoHtml = ad.logo_url 
                        ? `<img src="${esc(ad.logo_url)}" style="width:20px;height:20px;border-radius:4px;">` 
                        : '';

                    html += `
                        <div class="ad-card">
                            <div style="display: flex; gap: 0.5rem; align-items: center;">
                                ${logoHtml}
                                <div class="ad-title">${esc(ad.title || '')}</div>
                            </div>
                            <div class="ad-meta">${esc(ad.company || 'Sponsored')}</div>
                            <div style="font-size:0.8rem; margin:0.5rem 0;">${esc(ad.description || '')}</div>
                            <a href="${esc(ad.url || '#')}" target="_blank" style="color:var(--primary);font-weight:600;font-size:0.8rem;">Learn more →</a>
                            ${isAdmin ? `
                                <div class="ad-actions">
                                    <button class="edit-btn" onclick="window.app.editAd('${ad.id}')">Edit</button>
                                    <button class="delete-btn" onclick="window.app.deleteAd('${ad.id}')">Delete</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
                adContainer.innerHTML = html;
            }

            function renderAdList() {
                if (!adList) return;
                
                if (!ads || ads.length === 0) {
                    adList.innerHTML = '<div class="empty-state">No ads created</div>';
                    return;
                }

                let html = '';
                ads.forEach(ad => {
                    if (!ad) return;
                    
                    html += `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:0.5rem;border:1px solid var(--border-light);border-radius:8px;margin-bottom:0.5rem;">
                            <span><strong>${esc(ad.title || '')}</strong> · ${esc(ad.company || '')}</span>
                            <div>
                                <button class="edit-btn" onclick="window.app.editAd('${ad.id}')">Edit</button>
                                <button class="delete-btn" onclick="window.app.deleteAd('${ad.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
                adList.innerHTML = html;
            }

            // ==================== SINGLE APP OBJECT ====================
            window.app = {
                // Job functions
                showDetail: function(jobId) {
                    const job = jobs.find(j => j && j.id === jobId);
                    if (!job) {
                        showToast('Job not found', true);
                        return;
                    }
                    
                    if (job.apply_type === 'redirect' && job.apply_url) {
                        window.open(job.apply_url, '_blank');
                    } else {
                        showToast('Application form would open here');
                    }
                },

                editJob: async function(jobId) {
                    if (!isAdmin) {
                        showToast('Admin access required', true);
                        return;
                    }
                    
                    const job = jobs.find(j => j && j.id === jobId);
                    if (!job) {
                        showToast('Job not found', true);
                        return;
                    }
                    
                    titleIn.value = job.title || '';
                    companyIn.value = job.company || '';
                    locationIn.value = job.location || '';
                    typeIn.value = job.type || 'Full-time';
                    descIn.value = job.description || '';
                    logoIn.value = job.logo_url || '';
                    
                    // Set apply type
                    const applyType = job.apply_type || 'form';
                    currentApplyType = applyType;
                    applyTypeInput.value = applyType;
                    
                    document.querySelectorAll('.apply-option').forEach(opt => {
                        if (opt.dataset.type === applyType) {
                            opt.classList.add('active');
                        } else {
                            opt.classList.remove('active');
                        }
                    });
                    
                    if (applyType === 'redirect') {
                        applyUrlField.classList.remove('hidden');
                        applyUrl.value = job.apply_url || '';
                    } else {
                        applyUrlField.classList.add('hidden');
                        applyUrl.value = '';
                    }
                    
                    editJobId.value = job.id;
                    submitBtnText.innerText = 'Update job';
                    
                    // Switch to jobs tab
                    const jobsTabBtn = document.querySelector('[data-tab="jobs"]');
                    if (jobsTabBtn) jobsTabBtn.click();
                    
                    adminDrawer.classList.add('visible');
                },

                deleteJob: async function(jobId) {
                    if (!isAdmin) {
                        showToast('Admin access required', true);
                        return;
                    }
                    
                    if (!confirm('Delete this job?')) return;
                    
                    if (isOfflineMode) {
                        // Offline mode - just remove from memory
                        jobs = jobs.filter(j => j && j.id !== jobId);
                        renderJobCards();
                        showToast('Job deleted (offline mode)');
                        if (editJobId.value === jobId) resetJobForm();
                        return;
                    }
                    
                    try {
                        const { error } = await supabase.from('jobs').delete().eq('id', jobId);
                        if (error) throw error;
                        
                        // Update local state
                        jobs = jobs.filter(j => j && j.id !== jobId);
                        renderJobCards();
                        showToast('Job deleted');
                        
                        if (editJobId.value === jobId) resetJobForm();
                    } catch (err) {
                        console.error('Delete error:', err);
                        showToast('Failed to delete: ' + err.message, true);
                        // Reload to fix state
                        await loadJobs();
                    }
                },

                // Ad functions
                editAd: async function(adId) {
                    if (!isAdmin) {
                        showToast('Admin access required', true);
                        return;
                    }
                    
                    const ad = ads.find(a => a && a.id === adId);
                    if (!ad) {
                        showToast('Ad not found', true);
                        return;
                    }
                    
                    adTitle.value = ad.title || '';
                    adUrl.value = ad.url || '';
                    adCompany.value = ad.company || 'Sponsored';
                    adLogo.value = ad.logo_url || '';
                    adDesc.value = ad.description || '';
                    editAdId.value = ad.id;
                    adSubmitBtnText.innerText = 'Update ad';
                    
                    // Switch to ads tab
                    const adsTabBtn = document.querySelector('[data-tab="ads"]');
                    if (adsTabBtn) adsTabBtn.click();
                    
                    adminDrawer.classList.add('visible');
                },

                deleteAd: async function(adId) {
                    if (!isAdmin) {
                        showToast('Admin access required', true);
                        return;
                    }
                    
                    if (!confirm('Delete this ad?')) return;
                    
                    if (isOfflineMode) {
                        // Offline mode - just remove from memory
                        ads = ads.filter(a => a && a.id !== adId);
                        renderAds();
                        renderAdList();
                        showToast('Ad deleted (offline mode)');
                        if (editAdId.value === adId) resetAdForm();
                        return;
                    }
                    
                    try {
                        const { error } = await supabase.from('ads').delete().eq('id', adId);
                        if (error) throw error;
                        
                        // Update local state
                        ads = ads.filter(a => a && a.id !== adId);
                        renderAds();
                        renderAdList();
                        showToast('Ad deleted');
                        
                        if (editAdId.value === adId) resetAdForm();
                    } catch (err) {
                        console.error('Delete error:', err);
                        showToast('Failed to delete: ' + err.message, true);
                        await loadAds();
                    }
                }
            };

            // Login handler
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('adminEmail').value;
                const password = document.getElementById('adminPassword').value;

                if (email && password && password.length >= 6) {
                    isAdmin = true;
                    loginModal.classList.remove('visible');
                    adminDrawer.classList.add('visible');
                    showToast('Admin logged in');
                    renderJobCards();
                    renderAds();
                } else {
                    showToast('Invalid credentials', true);
                }
            });

            // Modal handlers
            showLoginBtn.addEventListener('click', () => {
                loginModal.classList.add('visible');
            });

            closeModalBtn.addEventListener('click', () => {
                loginModal.classList.remove('visible');
            });

            // Job form submit
            jobForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if (!titleIn.value.trim()) {
                    showToast('Job title required', true);
                    return;
                }

                if (currentApplyType === 'redirect' && !applyUrl.value.trim()) {
                    showToast('Application URL required for external apply', true);
                    return;
                }

                const payload = {
                    title: titleIn.value.trim(),
                    company: companyIn.value.trim() || null,
                    location: locationIn.value.trim() || null,
                    type: typeIn.value,
                    description: descIn.value.trim() || null,
                    logo_url: logoIn.value.trim() || null,
                    apply_type: currentApplyType,
                    apply_url: currentApplyType === 'redirect' ? applyUrl.value.trim() : null
                };

                const jobId = editJobId.value;

                // Offline mode - just update memory
                if (isOfflineMode) {
                    if (jobId) {
                        // Update
                        const index = jobs.findIndex(j => j && j.id === jobId);
                        if (index !== -1) {
                            jobs[index] = { ...jobs[index], ...payload, id: jobId };
                        }
                        showToast('Job updated (offline mode)');
                    } else {
                        // Add
                        const newJob = { ...payload, id: Date.now().toString() };
                        jobs = [newJob, ...jobs];
                        showToast('Job published (offline mode)');
                    }
                    renderJobCards();
                    resetJobForm();
                    return;
                }

                // Online mode - use Supabase
                try {
                    if (jobId) {
                        // Update
                        const { error } = await supabase.from('jobs').update(payload).eq('id', jobId);
                        if (error) throw error;
                        
                        // Update local state
                        const index = jobs.findIndex(j => j && j.id === jobId);
                        if (index !== -1) {
                            jobs[index] = { ...jobs[index], ...payload, id: jobId };
                        }
                        
                        showToast('Job updated');
                    } else {
                        // Insert
                        const { data, error } = await supabase.from('jobs').insert([payload]).select();
                        if (error) throw error;
                        
                        if (data && data[0]) {
                            jobs = [data[0], ...jobs];
                        }
                        
                        showToast('Job published');
                    }
                    
                    renderJobCards();
                    resetJobForm();
                } catch (err) {
                    console.error('Job operation failed:', err);
                    showToast('Failed: ' + err.message, true);
                    // Reload to fix state
                    await loadJobs();
                }
            });

            // Ad form submit
            adForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if (!adTitle.value.trim() || !adUrl.value.trim()) {
                    showToast('Title and URL required', true);
                    return;
                }

                const payload = {
                    title: adTitle.value.trim(),
                    url: adUrl.value.trim(),
                    company: adCompany.value.trim() || null,
                    logo_url: adLogo.value.trim() || null,
                    description: adDesc.value.trim() || null
                };

                const adId = editAdId.value;

                // Offline mode - just update memory
                if (isOfflineMode) {
                    if (adId) {
                        // Update
                        const index = ads.findIndex(a => a && a.id === adId);
                        if (index !== -1) {
                            ads[index] = { ...ads[index], ...payload, id: adId };
                        }
                        showToast('Ad updated (offline mode)');
                    } else {
                        // Add
                        const newAd = { ...payload, id: Date.now().toString() };
                        ads = [newAd, ...ads];
                        showToast('Ad published (offline mode)');
                    }
                    renderAds();
                    renderAdList();
                    resetAdForm();
                    return;
                }

                // Online mode - use Supabase
                try {
                    if (adId) {
                        // Update
                        const { error } = await supabase.from('ads').update(payload).eq('id', adId);
                        if (error) throw error;
                        
                        // Update local state
                        const index = ads.findIndex(a => a && a.id === adId);
                        if (index !== -1) {
                            ads[index] = { ...ads[index], ...payload, id: adId };
                        }
                        
                        showToast('Ad updated');
                    } else {
                        // Insert
                        const { data, error } = await supabase.from('ads').insert([payload]).select();
                        if (error) throw error;
                        
                        if (data && data[0]) {
                            ads = [data[0], ...ads];
                        }
                        
                        showToast('Ad published');
                    }
                    
                    renderAds();
                    renderAdList();
                    resetAdForm();
                } catch (err) {
                    console.error('Ad operation failed:', err);
                    showToast('Failed: ' + err.message, true);
                    await loadAds();
                }
            });

            // Cancel buttons
            cancelEdit.addEventListener('click', resetJobForm);
            cancelAdEdit.addEventListener('click', resetAdForm);

            // Initialize - NO LOCALSTORAGE
            loadJobs();
            loadAds();
            resetJobForm();
            resetAdForm();

            // Click outside to close modal
            window.addEventListener('click', (e) => {
                if (e.target === loginModal) {
                    loginModal.classList.remove('visible');
                }
            });
        })();
    </script>
</body>
</html>
