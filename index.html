<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Blog · Simple & Clean</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #0a66c2;
      --primary-dark: #084d96;
      --bg: #f8f6f3;
      --card: #ffffff;
      --text: #1d1c1a;
      --text-light: #5c5b58;
      --border: #e2dfda;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.08);
      --radius: 16px;
      --danger: #c74242;
      --success: #28a745;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #e0e0e0;
      --text-light: #a0a0a0;
      --border: #333;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .app-container {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }
    .header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--card); position: sticky; top: 0; z-index: 90; }
    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .auth-status { margin-left: auto; display: flex; align-items: center; gap: 14px; }
    .user-email { font-size: 0.9rem; color: var(--text-light); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .auth-btn {
      background: #eef4fc; color: var(--primary); border: 1px solid #d0e0f5;
      border-radius: 999px; padding: 8px 20px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .auth-btn:hover { background: #e2ebf9; }
    .auth-btn.logout { background: #fff5f5; color: var(--danger); border-color: #ffdede; }
    .main { padding: 24px 20px; }

    /* NEW: Filters */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      padding: 8px 18px; border-radius: 999px; background: var(--border); border: none;
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--primary); color: white; }

    /* Blog cards */
    .blog-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow-sm); transition: all 0.2s;
    }
    .blog-card:hover { box-shadow: var(--shadow-md); }
    .blog-card.expanded { box-shadow: var(--shadow-md); }
    .card-header { padding: 16px; display: flex; gap: 12px; }
    .blog-avatar {
      width: 48px; height: 48px; border-radius: 50%; background: var(--primary); color: white;
      display: grid; place-items: center; font-weight: bold; font-size: 1.3rem; flex-shrink: 0;
      background-size: cover; background-position: center;
    }
    .blog-meta { flex: 1; }
    .blog-meta h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
    .blog-meta-row { display: flex; gap: 8px; font-size: 0.85rem; color: var(--text-light); }
    .category-badge { background: #eef4fc; color: var(--primary); padding: 2px 10px; border-radius: 999px; font-size: 0.8rem; }
    .blog-content-preview, .blog-content-full {
      padding: 0 16px 16px; font-size: 1rem; line-height: 1.5;
    }
    .blog-content-full { display: none; }
    .blog-card.expanded .blog-content-preview { display: none; }
    .blog-card.expanded .blog-content-full { display: block; }
    .blog-image { width: 100%; display: block; margin-top: 8px; }
    .card-footer {
      padding: 12px 16px; border-top: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text-light); display: flex; gap: 12px;
    }
    .admin-actions { padding: 12px; text-align: right; }
    .delete-btn {
      background: none; border: 1px solid var(--danger); color: var(--danger);
      padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; cursor: pointer;
    }

    /* Admin panel */
    .admin-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 32px;
    }
    .admin-panel-header { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
    .admin-avatar-large {
      width: 56px; height: 56px; border-radius: 50%; background: var(--primary);
      color: white; display: grid; place-items: center; font-size: 1.6rem; font-weight: bold;
    }
    .url-input, #postContent, #postCategory {
      width: 100%; padding: 12px; border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 12px; font-family: inherit;
    }
    #postContent { min-height: 140px; resize: vertical; }
    .char-count { text-align: right; font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px; }
    .post-actions { display: flex; gap: 12px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none;
    }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-primary { background: var(--primary); color: white; }
    .test-url-btn { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 12px; margin-bottom: 12px; }
    #urlPreview { max-width: 100%; border-radius: 12px; margin: 12px 0; display: none; }

    /* Modal */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none;
      align-items: center; justify-content: center; z-index: 200;
    }
    .modal-content {
      background: var(--card); padding: 28px; border-radius: var(--radius);
      width: 90%; max-width: 360px; box-shadow: var(--shadow-md);
    }
    .modal input {
      width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border);
      border-radius: 12px;
    }
    .modal button { width: 100%; margin-bottom: 8px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #333; color: white; padding: 12px 24px; border-radius: 12px;
      z-index: 300; opacity: 0; transition: all 0.4s; max-width: 90%;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }
    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    .empty-feed { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .spinner { width: 40px; height: 40px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .main { padding: 16px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="logo"><i class="fab fa-linkedin"></i><span>Blog</span></div>
    <div class="auth-status">
      <span class="user-email" id="userEmail"></span>
      <button class="auth-btn" id="authBtn">Sign In</button>
      <button class="auth-btn" id="themeToggle" style="padding:8px 12px; min-width:unset;"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div class="main">
    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display:none;">
      <div class="admin-panel-header">
        <div class="admin-avatar-large" id="adminAvatar">A</div>
        <div><h3>Create Post</h3><p style="color:var(--text-light);">Share your thoughts</p></div>
      </div>
      <input type="url" id="imageUrlInput" class="url-input" placeholder="https://example.com/image.jpg (optional)" />
      <button class="test-url-btn" id="testUrlBtn"><i class="fas fa-eye"></i> Preview</button>
      <img id="urlPreview" src="" alt="Image preview" />

      <textarea id="postContent" placeholder="What would you like to share? (supports **bold**, *italic*, [link](url))" maxlength="2000"></textarea>
      <div class="char-count" id="charCount">0 / 2000</div>

      <select id="postCategory">
        <option value="Tech">Tech</option>
        <option value="Lifestyle">Lifestyle</option>
        <option value="Business">Business</option>
        <option value="Other">Other</option>
      </select>

      <div class="post-actions">
        <button class="btn btn-secondary" id="cancelPostBtn">Clear</button>
        <button class="btn btn-primary" id="publishBtn" disabled>Publish</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters" id="categoryFilters">
      <button data-cat="all" class="filter-btn active">All</button>
      <button data-cat="Tech" class="filter-btn">Tech</button>
      <button data-cat="Lifestyle" class="filter-btn">Lifestyle</button>
      <button data-cat="Business" class="filter-btn">Business</button>
      <button data-cat="Other" class="filter-btn">Other</button>
    </div>

    <div id="blogFeed">
      <div class="empty-feed"><div class="spinner"></div><p>Loading posts...</p></div>
    </div>
  </div>
</div>

<!-- Auth Modal -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Sign In</h3>
    <input type="email" id="emailInput" placeholder="Email" />
    <input type="password" id="passwordInput" placeholder="Password" />
    <button class="btn btn-primary" id="signInBtn">Sign In</button>
    <button class="btn btn-secondary" id="signUpBtn">Create Account</button>
    <button class="btn btn-secondary" id="closeModal">Cancel</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const SUPABASE_URL = 'https://msbtxocygbfpnjormhav.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_czos3mPNcvXkliq7dVVPkg_8ZXifAXB';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let posts = [];
  let activeCategory = 'all';
  let realtimeChannel = null;

  const MAX_CONTENT_LENGTH = 2000;

  const els = {
    authBtn: document.getElementById('authBtn'),
    userEmail: document.getElementById('userEmail'),
    adminPanel: document.getElementById('adminPanel'),
    blogFeed: document.getElementById('blogFeed'),
    publishBtn: document.getElementById('publishBtn'),
    cancelPostBtn: document.getElementById('cancelPostBtn'),
    postContent: document.getElementById('postContent'),
    postCategory: document.getElementById('postCategory'),
    imageUrlInput: document.getElementById('imageUrlInput'),
    urlPreview: document.getElementById('urlPreview'),
    testUrlBtn: document.getElementById('testUrlBtn'),
    charCount: document.getElementById('charCount'),
    adminAvatar: document.getElementById('adminAvatar'),
    themeToggle: document.getElementById('themeToggle'),
    toast: document.getElementById('toast'),
    authModal: document.getElementById('authModal'),
    emailInput: document.getElementById('emailInput'),
    passwordInput: document.getElementById('passwordInput'),
    signInBtn: document.getElementById('signInBtn'),
    signUpBtn: document.getElementById('signUpBtn'),
    closeModal: document.getElementById('closeModal'),
  };

  function showToast(message, type = 'info') {
    els.toast.textContent = message;
    els.toast.className = `toast ${type} show`;
    setTimeout(() => els.toast.classList.remove('show'), 3200);
  }

  function formatRelativeTime(ts) {
    if (!ts) return 'recent';
    const diff = Date.now() - new Date(ts);
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return `${min}m ago`;
    if (min < 1440) return `${Math.floor(min / 60)}h ago`;
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function simpleMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function isValidImageUrl(url) {
    if (!url) return false;
    try {
      const u = new URL(url);
      return /^https?:$/.test(u.protocol) && /\.(jpe?g|png|gif|webp)$/i.test(u.pathname);
    } catch { return false; }
  }

  function renderFeed() {
    const filtered = activeCategory === 'all' ? posts : posts.filter(p => p.category === activeCategory);

    if (filtered.length === 0) {
      els.blogFeed.innerHTML = `<div class="empty-feed"><i class="far fa-newspaper" style="font-size:2.4rem; opacity:0.6;"></i><p>No posts ${activeCategory !== 'all' ? 'in ' + activeCategory : 'yet'}.</p></div>`;
      return;
    }

    els.blogFeed.innerHTML = filtered.map(post => {
      const isOwner = currentUser && post.user_id === currentUser.id;
      const avatarStyle = post.user_avatar ? `background-image:url('${escapeHtml(post.user_avatar)}')` : '';
      const displayName = post.user_name || 'User';

      return `
        <div class="blog-card" data-id="${post.id}">
          <div class="card-header">
            <div class="blog-avatar" style="${avatarStyle}">${!post.user_avatar ? displayName[0]?.toUpperCase() || '?' : ''}</div>
            <div class="blog-meta">
              <h4>${escapeHtml(displayName)}</h4>
              <div class="blog-meta-row">
                <span>${formatRelativeTime(post.created_at)}</span>
                <span class="category-badge">${escapeHtml(post.category)}</span>
              </div>
            </div>
          </div>
          <div class="blog-content-preview">${simpleMarkdown(escapeHtml(post.content.slice(0, 280)))}...</div>
          <div class="blog-content-full">${simpleMarkdown(escapeHtml(post.content))}</div>
          ${post.imageurl ? `<img class="blog-image" src="${escapeHtml(post.imageurl)}" alt="Post image" loading="lazy">` : ''}
          <div class="card-footer">
            <span><i class="fas fa-chevron-down"></i> Tap to ${post.expanded ? 'collapse' : 'expand'}</span>
            ${post.imageurl ? '<span><i class="far fa-image"></i> Image</span>' : '<span>Text only</span>'}
          </div>
          ${isOwner ? `<div class="admin-actions"><button class="delete-btn" data-id="${post.id}"><i class="far fa-trash-alt"></i> Delete</button></div>` : ''}
        </div>`;
    }).join('');
  }

  async function loadPosts() {
    els.blogFeed.innerHTML = `<div class="empty-feed"><div class="spinner"></div><p>Loading posts...</p></div>`;
    try {
      const { data, error } = await supabase
        .from('posts')
        .select(`
          id, content, category, imageurl, created_at, user_id,
          user:user_id (email, raw_user_meta_data->>full_name as user_name, raw_user_meta_data->>avatar_url as user_avatar)
        `)
        .order('created_at', { ascending: false });

      if (error) throw error;
      posts = data || [];
      renderFeed();
    } catch (err) {
      console.error(err);
      showToast('Failed to load posts: ' + err.message, 'error');
    }
  }

  async function createPost() {
    const content = els.postContent.value.trim();
    if (!content) return showToast('Please write something', 'error');

    const imageurl = els.imageUrlInput.value.trim() || null;
    if (imageurl && !isValidImageUrl(imageurl)) {
      if (!confirm('Image URL looks invalid. Publish anyway?')) return;
    }

    els.publishBtn.disabled = true;
    els.publishBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:3px;"></div> Publishing...';

    try {
      const { error } = await supabase.from('posts').insert({
        content, category: els.postCategory.value, imageurl, user_id: currentUser.id
      });
      if (error) throw error;
      showToast('Post published!', 'success');
      resetForm();
      await loadPosts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    } finally {
      els.publishBtn.disabled = false;
      els.publishBtn.textContent = 'Publish';
    }
  }

  async function deletePost(id) {
    if (!confirm('Delete this post?')) return;
    try {
      const { error } = await supabase.from('posts').delete().eq('id', id).eq('user_id', currentUser.id);
      if (error) throw error;
      showToast('Post deleted', 'success');
      await loadPosts();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  function resetForm() {
    els.postContent.value = '';
    els.imageUrlInput.value = '';
    els.urlPreview.style.display = 'none';
    els.charCount.textContent = '0 / 2000';
    els.publishBtn.disabled = true;
  }

  function updateAuthUI() {
    if (currentUser) {
      const name = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
      els.userEmail.textContent = name;
      els.authBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Sign Out';
      els.authBtn.classList.add('logout');
      els.adminPanel.style.display = 'block';

      const avatarUrl = currentUser.user_metadata?.avatar_url;
      if (avatarUrl) {
        els.adminAvatar.style.backgroundImage = `url('${avatarUrl}')`;
        els.adminAvatar.textContent = '';
      } else {
        els.adminAvatar.textContent = name[0]?.toUpperCase() || '?';
      }
    } else {
      els.userEmail.textContent = '';
      els.authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      els.authBtn.classList.remove('logout');
      els.adminPanel.style.display = 'none';
    }
  }

  function handleFeedClick(e) {
    const card = e.target.closest('.blog-card');
    if (!card) return;
    if (e.target.closest('.delete-btn')) {
      e.stopPropagation();
      deletePost(e.target.closest('.delete-btn').dataset.id);
      return;
    }
    card.classList.toggle('expanded');
  }

  // ────────────────────────────── EVENT LISTENERS ──────────────────────────────
  els.postContent.addEventListener('input', () => {
    const len = els.postContent.value.length;
    els.charCount.textContent = `${len} / ${MAX_CONTENT_LENGTH}`;
    els.publishBtn.disabled = len === 0 || len > MAX_CONTENT_LENGTH;
  });

  els.publishBtn.addEventListener('click', createPost);
  els.cancelPostBtn.addEventListener('click', resetForm);

  els.testUrlBtn.addEventListener('click', () => {
    const url = els.imageUrlInput.value.trim();
    if (!url || !isValidImageUrl(url)) return showToast('Invalid image URL', 'error');
    els.urlPreview.src = url;
    els.urlPreview.style.display = 'block';
    els.urlPreview.onerror = () => { showToast('Could not load image', 'error'); els.urlPreview.style.display = 'none'; };
  });

  // Theme
  els.themeToggle.addEventListener('click', () => {
    const isDark = document.documentElement.dataset.theme === 'dark';
    document.documentElement.dataset.theme = isDark ? '' : 'dark';
    els.themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    localStorage.setItem('theme', isDark ? '' : 'dark');
  });

  // Filters
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
      renderFeed();
    });
  });

  // Auth modal
  function showAuthModal() { els.authModal.style.display = 'flex'; }
  function hideAuthModal() { els.authModal.style.display = 'none'; els.emailInput.value = els.passwordInput.value = ''; }

  els.authBtn.addEventListener('click', async () => {
    if (currentUser) {
      await supabase.auth.signOut();
    } else {
      showAuthModal();
    }
  });

  els.signInBtn.addEventListener('click', async () => {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: els.emailInput.value.trim(),
      password: els.passwordInput.value
    });
    if (error) return showToast(error.message, 'error');
    currentUser = data.user;
    updateAuthUI();
    hideAuthModal();
    loadPosts();
  });

  els.signUpBtn.addEventListener('click', async () => {
    const { data, error } = await supabase.auth.signUp({
      email: els.emailInput.value.trim(),
      password: els.passwordInput.value
    });
    if (error) return showToast(error.message, 'error');
    showToast('Check your email to confirm!', 'success');
    hideAuthModal();
  });

  els.closeModal.addEventListener('click', hideAuthModal);

  // Feed click delegation (only once)
  els.blogFeed.addEventListener('click', handleFeedClick);

  // Init
  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user ?? null;
    updateAuthUI();

    // Realtime auth listener
    supabase.auth.onAuthStateChange((event, session) => {
      currentUser = session?.user ?? null;
      updateAuthUI();
      loadPosts();
    });

    await loadPosts();

    // Realtime posts
    supabase.channel('public:posts')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => loadPosts())
      .subscribe();

    // Restore theme
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.dataset.theme = 'dark';
      els.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
  }

  init();
</script>
</body>
</html>
