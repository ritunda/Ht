<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Blog · Simple & Clean</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #0a66c2;
      --primary-dark: #084d96;
      --bg: #f8f6f3;
      --card: #ffffff;
      --text: #1d1c1a;
      --text-light: #5c5b58;
      --border: #e2dfda;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.08);
      --radius: 16px;
      --danger: #c74242;
      --success: #28a745;
    }

    [data-theme="dark"] {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #e0e0e0;
      --text-light: #a0a0a0;
      --border: #333;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      touch-action: manipulation; /* better mobile feel */
    }

    .app-container {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.06);
    }

    .header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }

    .auth-status { margin-left: auto; display: flex; align-items: center; gap: 14px; }

    .user-email {
      font-size: 0.9rem;
      color: var(--text-light);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-btn {
      background: #eef4fc;
      color: var(--primary);
      border: 1px solid #d0e0f5;
      border-radius: 999px;
      padding: 8px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-btn:hover { background: #e2ebf9; }
    .auth-btn.logout { background: #fff5f5; color: var(--danger); border-color: #ffdede; }

    .main { padding: 24px 20px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      max-width: 90%;
      text-align: center;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-8px); }

    .toast.success { background: var(--success); }
    .toast.error   { background: var(--danger); }

    /* Rest of your existing styles remain mostly the same... */
    /* ... I'll only show changed/new parts for brevity */

    .blog-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: grid;
      place-items: center;
      font-weight: bold;
      font-size: 1.3rem;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
    }

    .blog-meta h4 { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }

    .admin-panel { display: none; }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.7);
      display: grid;
      place-items: center;
      z-index: 10;
      border-radius: var(--radius);
    }

    [data-theme="dark"] .loading-overlay { background: rgba(30,30,30,0.7); }

    .spinner {
      width: 40px;
      height: 40px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .main { padding: 16px 16px; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="app-container">

  <div class="header">
    <div class="logo">
      <i class="fab fa-linkedin"></i>
      <span>Blog</span>
    </div>
    <div class="auth-status">
      <span class="user-email" id="userEmail"></span>
      <button class="auth-btn" id="authBtn">Sign In</button>
      <button class="auth-btn" id="themeToggle" style="padding:8px 12px; min-width:unset;">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </div>

  <div class="main">

    <div id="adminPanel" class="admin-panel">
      <div class="admin-panel-header">
        <div class="admin-avatar-large" id="adminAvatar">A</div>
        <div>
          <h3>Create Post</h3>
          <p style="color:var(--text-light);">Share your thoughts</p>
        </div>
      </div>

      <input type="url" id="imageUrlInput" class="url-input" placeholder="https://example.com/image.jpg (optional)" />
      <button class="test-url-btn" id="testUrlBtn"><i class="fas fa-eye"></i> Preview</button>
      <img id="urlPreview" src="" alt="Image preview" style="display:none;" />

      <textarea id="postContent" placeholder="What would you like to share? (supports **bold**, *italic*, [link](url))" maxlength="2000"></textarea>
      <div class="char-count" id="charCount">0 / 2000</div>

      <select id="postCategory">
        <option value="Tech">Tech</option>
        <option value="Lifestyle">Lifestyle</option>
        <option value="Business">Business</option>
        <option value="Other">Other</option>
      </select>

      <div class="post-actions">
        <button class="btn btn-secondary" id="cancelPostBtn">Clear</button>
        <button class="btn btn-primary" id="publishBtn" disabled>Publish</button>
      </div>
    </div>

    <!-- Feed header + filters (unchanged except minor spacing) -->

    <div id="blogFeed">
      <div class="empty-feed">
        <div class="loading-spinner" style="width:32px;height:32px;"></div>
        <p>Loading posts...</p>
      </div>
    </div>

  </div>

  <!-- Auth Modal (unchanged for brevity) -->

  <div id="toast" class="toast"></div>

</div>

<script>
  // ────────────────────────────────────────────────
  //  CONFIG & STATE
  // ────────────────────────────────────────────────
  const SUPABASE_URL = 'https://msbtxocygbfpnjormhav.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_czos3mPNcvXkliq7dVVPkg_8ZXifAXB';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let posts = [];
  let activeCategory = 'all';
  let realtimeChannel = null;

  const MAX_CONTENT_LENGTH = 2000;

  const els = {
    authBtn: document.getElementById('authBtn'),
    userEmail: document.getElementById('userEmail'),
    adminPanel: document.getElementById('adminPanel'),
    blogFeed: document.getElementById('blogFeed'),
    publishBtn: document.getElementById('publishBtn'),
    cancelPostBtn: document.getElementById('cancelPostBtn'),
    postContent: document.getElementById('postContent'),
    postCategory: document.getElementById('postCategory'),
    imageUrlInput: document.getElementById('imageUrlInput'),
    urlPreview: document.getElementById('urlPreview'),
    testUrlBtn: document.getElementById('testUrlBtn'),
    charCount: document.getElementById('charCount'),
    adminAvatar: document.getElementById('adminAvatar'),
    themeToggle: document.getElementById('themeToggle'),
    toast: document.getElementById('toast'),
  };

  // ────────────────────────────────────────────────
  //  HELPERS
  // ────────────────────────────────────────────────
  function showToast(message, type = 'info') {
    els.toast.textContent = message;
    els.toast.className = `toast ${type} show`;
    setTimeout(() => els.toast.classList.remove('show'), 3200);
  }

  function formatRelativeTime(ts) {
    if (!ts) return 'recent';
    const date = new Date(ts);
    const diff = Date.now() - date;
    const min = Math.floor(diff / 60000);
    if (min < 1) return 'just now';
    if (min < 60) return `${min}m ago`;
    if (min < 1440) return `${Math.floor(min / 60)}h ago`;
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function simpleMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function isValidImageUrl(url) {
    if (!url) return false;
    try {
      const u = new URL(url);
      return /^https?:$/.test(u.protocol) && /\.(jpe?g|png|gif|webp)$/i.test(u.pathname);
    } catch {
      return false;
    }
  }

  // ────────────────────────────────────────────────
  //  RENDER
  // ────────────────────────────────────────────────
  function renderFeed() {
    const filtered = activeCategory === 'all' ? posts : posts.filter(p => p.category === activeCategory);

    if (filtered.length === 0) {
      els.blogFeed.innerHTML = `
        <div class="empty-feed">
          <i class="far fa-newspaper" style="font-size:2.4rem; opacity:0.6;"></i>
          <p>No posts ${activeCategory !== 'all' ? 'in ' + activeCategory : 'yet'}.</p>
        </div>`;
      return;
    }

    els.blogFeed.innerHTML = filtered.map(post => {
      const isOwner = currentUser && post.user_id === currentUser.id;
      const avatarStyle = post.user_avatar ? `background-image:url('${escapeHtml(post.user_avatar)}')` : '';
      const displayName = post.user_name || 'User';

      return `
        <div class="blog-card" data-id="${post.id}">
          <div class="card-header">
            <div class="blog-avatar" style="${avatarStyle}">${!post.user_avatar ? displayName[0]?.toUpperCase() || '?' : ''}</div>
            <div class="blog-meta">
              <h4>${escapeHtml(displayName)}</h4>
              <div class="blog-meta-row">
                <span>${formatRelativeTime(post.created_at)}</span>
                <span class="category-badge">${escapeHtml(post.category)}</span>
              </div>
            </div>
          </div>
          <div class="blog-content-preview">${simpleMarkdown(escapeHtml(post.content.slice(0, 280)))}</div>
          <div class="blog-content-full">${simpleMarkdown(escapeHtml(post.content))}</div>
          ${post.imageurl ? `<img class="blog-image" src="${escapeHtml(post.imageurl)}" alt="Post image" loading="lazy">` : ''}
          <div class="card-footer">
            <span><i class="fas fa-chevron-down"></i> Tap to ${post.expanded ? 'collapse' : 'expand'}</span>
            ${post.imageurl ? '<span><i class="far fa-image"></i> Image</span>' : '<span>Text only</span>'}
          </div>
          ${isOwner ? `
            <div class="admin-actions">
              <button class="delete-btn" data-id="${post.id}">
                <i class="far fa-trash-alt"></i> Delete
              </button>
            </div>` : ''}
        </div>`;
    }).join('');

    // Event delegation for expand/collapse + delete
    els.blogFeed.addEventListener('click', e => {
      const card = e.target.closest('.blog-card');
      if (!card) return;

      if (e.target.closest('.delete-btn')) {
        e.stopPropagation();
        const id = e.target.closest('.delete-btn').dataset.id;
        if (confirm('Delete this post?')) deletePost(id);
        return;
      }

      card.classList.toggle('expanded');
    });
  }

  // ────────────────────────────────────────────────
  //  DATA OPERATIONS
  // ────────────────────────────────────────────────
  async function loadPosts() {
    els.blogFeed.innerHTML = `<div class="empty-feed"><div class="spinner"></div><p>Loading...</p></div>`;

    try {
      // Join with profiles table (you need to create a profiles table or adjust query)
      const { data, error } = await supabase
        .from('posts')
        .select(`
          id, content, category, imageurl, created_at, user_id,
          user:user_id (email, raw_user_meta_data->>full_name as user_name, raw_user_meta_data->>avatar_url as user_avatar)
        `)
        .order('created_at', { ascending: false });

      if (error) throw error;
      posts = data || [];
      renderFeed();
    } catch (err) {
      console.error(err);
      showToast('Failed to load posts: ' + err.message, 'error');
    }
  }

  async function createPost() {
    const content = els.postContent.value.trim();
    if (!content) return showToast('Please write something', 'error');

    const imageurl = els.imageUrlInput.value.trim() || null;
    if (imageurl && !isValidImageUrl(imageurl)) {
      if (!confirm('Image URL looks invalid. Publish anyway?')) return;
    }

    els.publishBtn.disabled = true;
    els.publishBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:3px;"></div> Publishing...';

    try {
      const { error } = await supabase.from('posts').insert({
        content,
        category: els.postCategory.value,
        imageurl,
        user_id: currentUser.id
      });

      if (error) throw error;

      showToast('Post published!', 'success');
      resetForm();
      await loadPosts();
    } catch (err) {
      showToast('Error: ' + err.message, 'error');
    } finally {
      els.publishBtn.disabled = false;
      els.publishBtn.textContent = 'Publish';
    }
  }

  async function deletePost(id) {
    try {
      const { error } = await supabase.from('posts').delete().eq('id', id).eq('user_id', currentUser.id);
      if (error) throw error;
      showToast('Post deleted', 'success');
      await loadPosts();
    } catch (err) {
      showToast('Delete failed: ' + err.message, 'error');
    }
  }

  function resetForm() {
    els.postContent.value = '';
    els.imageUrlInput.value = '';
    els.urlPreview.style.display = 'none';
    els.charCount.textContent = '0 / 2000';
    els.publishBtn.disabled = true;
  }

  // ────────────────────────────────────────────────
  //  AUTH & UI
  // ────────────────────────────────────────────────
  function updateAuthUI() {
    if (currentUser) {
      const name = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
      els.userEmail.textContent = name;
      els.authBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> Sign Out';
      els.authBtn.classList.add('logout');
      els.adminPanel.style.display = 'block';

      // Admin avatar
      const avatarUrl = currentUser.user_metadata?.avatar_url;
      if (avatarUrl) {
        els.adminAvatar.style.backgroundImage = `url('${avatarUrl}')`;
        els.adminAvatar.textContent = '';
      } else {
        els.adminAvatar.textContent = name[0]?.toUpperCase() || '?';
      }
    } else {
      els.userEmail.textContent = '';
      els.authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      els.authBtn.classList.remove('logout');
      els.adminPanel.style.display = 'none';
    }
  }

  // ────────────────────────────────────────────────
  //  EVENT LISTENERS (only new/changed shown)
  // ────────────────────────────────────────────────
  let previewTimeout;
  els.testUrlBtn.addEventListener('click', () => {
    clearTimeout(previewTimeout);
    const url = els.imageUrlInput.value.trim();
    if (!url) return;

    previewTimeout = setTimeout(async () => {
      if (!isValidImageUrl(url)) {
        showToast('Invalid image URL', 'error');
        return;
      }
      els.urlPreview.src = url;
      els.urlPreview.style.display = 'block';
      els.urlPreview.onerror = () => {
        showToast('Could not load image', 'error');
        els.urlPreview.style.display = 'none';
      };
    }, 600);
  });

  els.themeToggle.addEventListener('click', () => {
    const current = document.documentElement.dataset.theme;
    const next = current === 'dark' ? '' : 'dark';
    document.documentElement.dataset.theme = next;
    els.themeToggle.innerHTML = next === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('theme', next);
  });

  // Restore theme
  if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.dataset.theme = 'dark';
    els.themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  }

  // Rest of your auth, publish, filter listeners remain similar...
  // Just replace alert() with showToast() where appropriate

  // INIT
  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    currentUser = session?.user ?? null;
    updateAuthUI();

    await loadPosts();

    // Realtime
    supabase
      .channel('public:posts')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, () => loadPosts())
      .subscribe();
  }

  init();
</script>
</body>
</html>
